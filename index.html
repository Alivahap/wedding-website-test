<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nikah Daveti | Ali Vahap & Nurbahar</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Montserrat',sans-serif;
      background:#0b0b0b;
      color:#fff;
      overflow-x:hidden;
    }

    /* VIDEO BACKGROUND */
    .hero{
      height:100vh;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      overflow:hidden;
    }

    .hero video{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      min-width:100%;
      min-height:100%;
      object-fit:cover;
      z-index:0;
      filter:brightness(0.6);
    }

    .overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(0,0,0,0.4),rgba(0,0,0,0.8));
      z-index:1;
    }

    .content{
      position:relative;
      z-index:2;
      padding:20px;
    }

    h1{
      font-family:'Great Vibes',cursive;
      font-size:64px;
    }

    h2{
      font-weight:300;
      margin:10px 0;
    }

    .date{
      margin:10px 0 20px;
      opacity:0.9;
    }

    .btn{
      display:inline-block;
      padding:12px 20px;
      border-radius:30px;
      margin:5px;
      text-decoration:none;
      color:#fff;
      background:#25D366;
      font-weight:600;
    }

    .btn.blue{background:#4285F4;}

    .section{
      padding:60px 20px;
      text-align:center;
    }

    .card{
      max-width:700px;
      margin:auto;
      background:#141414;
      padding:25px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }

    /* PETALS */
    .petal{
      position:fixed;
      top:-10px;
      width:12px;
      height:12px;
      background:pink;
      border-radius:50%;
      opacity:0.7;
      animation:fall linear infinite;
      z-index:9999;
    }

    @keyframes fall{
      to{transform:translateY(110vh) rotate(360deg);opacity:0;}
    }

    /* SLIDER */
    .slider{
      overflow:hidden;
      border-radius:15px;
    }

    .slides{
      display:flex;
      transition:transform .5s ease;
    }

    .slides img{
      width:100%;
    }

    iframe{
      width:100%;
      height:300px;
      border:0;
      border-radius:15px;
    }

    /* RSVP */
    .rsvp input, .rsvp select{
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:10px;
      border:none;
    }

    .rsvp button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#25D366;
      color:#fff;
      font-weight:600;
      cursor:pointer;
    }

    .list{
      margin-top:20px;
      text-align:left;
    }
  </style>
</head>
<body>

<!-- VIDEO BACKGROUND -->
<div class="hero">
  <video autoplay muted loop playsinline>
    <source src="https://cdn.coverr.co/videos/coverr-sunset-wedding-8577/1080p.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <div class="content">
    <h1>Ali Vahap & Nurbahar</h1>
    <h2>Mutluluğa Evet Diyoruz 💍</h2>
    <div class="date">4 Haziran 2026 • 15:00</div>

    <a class="btn" href="https://chat.whatsapp.com/YOUR_GROUP_LINK">WhatsApp Grubu</a>
    <a class="btn blue" href="#rsvp">Katılım Bildir</a>

    <div id="countdown"></div>
  </div>
</div>

<!-- PETALS -->
<script>
for(let i=0;i<30;i++){
  let p=document.createElement("div");
  p.className="petal";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(Math.random()*5+5)+"s";
  document.body.appendChild(p);
}
</script>

<!-- INFO -->
<div class="section">
  <div class="card">
    <h2>📍 Nikah Yeri</h2>
    <p>Kars Müftülüğü</p>
  </div>
</div>

<!-- SLIDER -->
<div class="section">
  <div class="card slider">
    <div class="slides" id="slides">
      <img src="https://source.unsplash.com/800x400/?wedding" />
      <img src="https://source.unsplash.com/800x400/?love" />
      <img src="https://source.unsplash.com/800x400/?couple" />
    </div>
  </div>
</div>

<!-- MAP -->
<div class="section">
  <div class="card">
    <h2>🧭 Konum</h2>
    <iframe src="https://www.google.com/maps/place//data=!4m2!3m1!1s0x40698edc5edc534d:0x8c71784bbbc3b775?sa=X&ved=1t:8290&ictx=111"></iframe>
  </div>
</div>

<!-- RSVP -->
<div class="section" id="rsvp">
  <div class="card rsvp">
    <h2>💌 Katılım Bildir</h2>
    <input id="name" placeholder="Ad Soyad" />
    <select id="status">
      <option value="Katılıyorum">Katılıyorum</option>
      <option value="Katılamıyorum">Katılamıyorum</option>
    </select>
    <button onclick="saveRSVP()">Gönder</button>

    <div class="list" id="list"></div>
  </div>
</div>

<script>
// COUNTDOWN
const weddingDate=new Date("2026-06-04T15:00:00").getTime();
setInterval(()=>{
  let now=new Date().getTime();
  let d=weddingDate-now;

  document.getElementById("countdown").innerHTML=
  Math.floor(d/86400000)+"g "+
  Math.floor((d%86400000)/3600000)+"s";
},1000);

// SLIDER
let i=0;
setInterval(()=>{
  i=(i+1)%3;
  document.getElementById("slides").style.transform=`translateX(-${i*100}%)`;
},3000);

// RSVP
function saveRSVP(){
  let name=document.getElementById("name").value;
  let status=document.getElementById("status").value;

  if(!name)return;

  let data=JSON.parse(localStorage.getItem("rsvp")||"[]");
  data.push({name,status});
  localStorage.setItem("rsvp",JSON.stringify(data));

  renderRSVP();
}

function renderRSVP(){
  let data=JSON.parse(localStorage.getItem("rsvp")||"[]");
  document.getElementById("list").innerHTML=data.map(x=>`<p>${x.name} - ${x.status}</p>`).join("");
}

renderRSVP();
</script>

</body>
</html>
